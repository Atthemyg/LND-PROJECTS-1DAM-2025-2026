<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego de Memoria</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2f2f4f);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .game {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      gap: 10px;
      justify-content: center;
    }

    .card {
      width: 100px;
      height: 100px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s;
      cursor: pointer;
    }

    .card.flip {
      transform: rotateY(180deg);
    }

    .front,
    .back {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      backface-visibility: hidden;
    }

    .front {
      background: #74b9ff;
    }

    .back {
      background: white;
      color: black;
      transform: rotateY(180deg);
    }

    .info {
      margin-top: 20px;
      font-size: 20px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #55efc4;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🧠 Juego de Memoria</h1>

    <div class="game" id="game"></div>

    <div class="info">
      Movimientos: <span id="moves">0</span>
    </div>

    <button onclick="startGame()">🔄 Reiniciar</button>
  </div>

  <script>
    const emojis = ["🍎", "🍌", "🍇", "🍉", "🍒", "🥝", "🍍", "🍋"];
    let cardsArray = [...emojis, ...emojis];

    const game = document.getElementById("game");
    const movesText = document.getElementById("moves");

    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let moves = 0;

    function shuffle(array) {
      array.sort(() => Math.random() - 0.5);
    }

    function startGame() {
      game.innerHTML = "";
      shuffle(cardsArray);

      firstCard = null;
      secondCard = null;
      lockBoard = false;
      moves = 0;

      movesText.textContent = moves;

      cardsArray.forEach(emoji => {
        const card = document.createElement("div");
        card.classList.add("card");

        card.innerHTML = `
          <div class="front">❓</div>
          <div class="back">${emoji}</div>
        `;

        card.dataset.emoji = emoji;

        card.addEventListener("click", flipCard);

        game.appendChild(card);
      });
    }

    function flipCard() {
      if (lockBoard) return;
      if (this === firstCard) return;

      this.classList.add("flip");

      if (!firstCard) {
        firstCard = this;
        return;
      }

      secondCard = this;
      lockBoard = true;
      moves++;

      movesText.textContent = moves;

      checkMatch();
    }

    function checkMatch() {
      const isMatch =
        firstCard.dataset.emoji === secondCard.dataset.emoji;

      if (isMatch) {
        disableCards();
      } else {
        unflipCards();
      }
    }

    function disableCards() {
      firstCard.removeEventListener("click", flipCard);
      secondCard.removeEventListener("click", flipCard);

      resetBoard();

      checkWin();
    }

    function unflipCards() {
      setTimeout(() => {
        firstCard.classList.remove("flip");
        secondCard.classList.remove("flip");

        resetBoard();
      }, 1000);
    }

    function resetBoard() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    function checkWin() {
      const flippedCards = document.querySelectorAll(".flip");

      if (flippedCards.length === cardsArray.length) {
        setTimeout(() => {
          alert("🎉 ¡Ganaste en " + moves + " movimientos!");
        }, 500);
      }
    }

    startGame();
  </script>

</body>
</html>
